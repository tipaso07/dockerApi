<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickStack - Iniciar Sesión</title>
  <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h2 id="form-title">Iniciar Sesión</h2>
      <div id="error-msg" class="error hidden"></div>
      <form id="auth-form">
        <div id="name-field" class="hidden">
          <input type="text" id="reg-nombre" placeholder="Nombre completo">
          <select id="reg-rol">
            <option value="Cliente">Cliente</option>
            <option value="Repartidor">Repartidor</option>
          </select>
        </div>
        <input type="email" id="auth-email" placeholder="Correo electrónico" required>
        <input type="password" id="auth-password" placeholder="Contraseña" required>
        <button type="submit" id="auth-btn">Ingresar</button>
      </form>
      <div class="toggle-link" id="toggle-auth">¿No tienes cuenta? Regístrate</div>
    </div>
  </div>
  <script src="/js/auth.js"></script>
</body>
</html>
